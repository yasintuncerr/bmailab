# =============================================================================
# incus-dns-sync.conf — Servis yapılandırma dosyası
# Konum: /etc/incus-dns-sync/incus-dns-sync.conf
# =============================================================================

# --- Technitium DNS API ---
TECHNITIUM_API="http://<TECHNITIUM_API_HOST>:<TECHNITIUM_WEB_PORT>"
TECHNITIUM_TOKEN="<TECHNITIUM_API_TOKEN>"

# --- DNS Zone ---
DNS_ZONE="<LAB_DOMAIN>"

# --- Instance ağ arayüzü ---
# IP adresi bu arayüzden alınır
INSTANCE_IFACE="eth0"

# --- IP bekleme ayarları ---
# Instance başladıktan sonra IP atanana kadar kaç saniye beklenir (maksimum)
IP_WAIT_TIMEOUT=60
# Her denemeler arası bekleme (saniye)
IP_POLL_INTERVAL=3

# --- DNS TTL ---
DNS_TTL=300

# --- Loglama ---
# Seviyeler: DEBUG | INFO | WARN | ERROR
LOG_LEVEL="INFO"
LOG_FILE="/var/log/incus-dns-sync/incus-dns-sync.log"
LOG_MAX_BYTES=10485760   # 10 MB — bu boyutu aşınca rotate edilir
LOG_KEEP_FILES=5

# --- Lock dosyası ---
LOCK_FILE="/run/incus-dns-sync.lock"
